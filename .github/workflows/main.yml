name: Deploy Bot

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APP_ID: 1780863075904
    steps:
      - uses: actions/checkout@v4

      - name: Prepare environment
        run: |
          cat > /dev/shm/.env << 'EOF'
          DISCORD_TOKEN=${{ secrets.DISCORD_TOKEN }}
          DISCORD_CLIENT_ID=${{ secrets.DISCORD_CLIENT_ID }}
          HF_TOKEN=${{ secrets.HF_TOKEN }}
          HF_BUCKET_NAME=${{ secrets.HF_BUCKET_NAME }}
          SERVICES_URL=${{ secrets.SERVICES_URL }}
          API_SECRET=${{ secrets.API_SECRET }}
          EOF
          chmod 600 /dev/shm/.env
          cp /dev/shm/.env .env
          zip -r /dev/shm/bot.zip . -x "*.git*" ".github/*" "*.log"
          shred -u .env

      - name: Delete old app
        run: |
          curl -X DELETE https://api.discloud.app/v2/app/${{ env.APP_ID }}/delete \
            -H "api-token: ${{ secrets.DISCLOUD_TOKEN }}"
          sleep 5

      - name: Upload new app
        run: |
          curl -X POST https://api.discloud.app/v2/upload \
            -H "api-token: ${{ secrets.DISCLOUD_TOKEN }}" \
            -F "file=@/dev/shm/bot.zip;type=application/zip"

      - name: Check Status
        run: |
          curl -X GET https://api.discloud.app/v2/app/${{ env.APP_ID }}/status \
            -H "api-token: ${{ secrets.DISCLOUD_TOKEN }}"

      - name: Cleanup
        if: always()
        run: |
          shred -u /dev/shm/.env 2>/dev/null || true
          shred -u /dev/shm/bot.zip 2>/dev/null || true
