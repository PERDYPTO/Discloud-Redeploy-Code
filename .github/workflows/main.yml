name: Deploy Bot

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APP_ID: 1780863075904
      DISCLOUD_TOKEN: ${{ secrets.DISCLOUD_TOKEN }}
    steps:
      - uses: actions/checkout@v4

      - name: Install SDK
        run: npm install discloud.app

      - name: Prepare environment
        run: |
          cat > /dev/shm/.env << 'EOF'
          DISCORD_TOKEN=${{ secrets.DISCORD_TOKEN }}
          DISCORD_CLIENT_ID=${{ secrets.DISCORD_CLIENT_ID }}
          HF_TOKEN=${{ secrets.HF_TOKEN }}
          HF_BUCKET_NAME=${{ secrets.HF_BUCKET_NAME }}
          SERVICES_URL=${{ secrets.SERVICES_URL }}
          API_SECRET=${{ secrets.API_SECRET }}
          EOF
          cp /dev/shm/.env .env
          zip -r /dev/shm/bot.zip . -x "*.git*" ".github/*" "*.log" "deploy.js"
          shred -u .env

      - name: Deploy with SDK
        run: node deploy.js

      - name: Cleanup
        if: always()
        run: |
          shred -u /dev/shm/.env 2>/dev/null || true
          shred -u /dev/shm/bot.zip 2>/dev/null || true
